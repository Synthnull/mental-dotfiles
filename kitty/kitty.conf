#https://gemini.google.com/app ── Font ────────────────────────────────────────────
font_family      JetBrainsMonoNL Nerd Font Mono
bold_font        auto
italic_font      auto
font_size        12.0

# Better alignment + emoji rendering
#symbol_map U+23FB-U+23FE,U+2B58,U+E000-U+F8FF Nerd Font
#box_drawing_scale 1 1 1 1

# ── Appearance ──────────────────────────────────────
background_opacity 0.92
background_blur 7

# Disable window decorations (Hyprland handles it)
hide_window_decorations yes

# Padding
window_padding_width 6

# Cursor
cursor_shape beam
cursor_blink_interval 0

# ── Colors (nice neutral theme) ─────────────────────
#foreground #d0d0d0
background #0b0b10
foreground #cad3f5

color0  #494d64
color1  #ed8796
color2  #a6da95
color3  #eed49f
color4  #8aadf4
color5  #c6a0f6
color6  #8bd5ca
color7  #b8c0e0
color8  #5b6078
color9  #ed8796
color10 #a6da95
color11 #eed49f
color12 #8aadf4
color13 #c6a0f6
color14 #8bd5ca
color15 #a5adcb

# ── Performance / Behavior ─────────────────────────
sync_to_monitor yes
enable_audio_bell no
allow_remote_control yes

# ── Keybinds (optional, simple + useful) ───────────
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard

