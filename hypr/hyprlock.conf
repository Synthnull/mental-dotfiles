input-field {
   monitor = DP-3
   size = 280, 25            # Increased size for better proportions
   outline_thickness = 1
   dots_size = 0.25          # Slightly larger dots
   dots_spacing = 0.2        # Better spacing between dots
   dots_center = true        # Centered dots look much cleaner with a centered clock
   dots_rounding = -2        # Dots will match the rounding of the box
   font_family = JetBrainsMonoNL NFM

   # Color Palette: Matching your clock and the Mt. Fuji tones
   outer_color = rgba(224, 187, 228, 0.8) # Soft Lavender (matching your 0xffE0BBE4)
   inner_color = rgba(200, 200, 200, 0.2) # Semi-transparent grey
   font_color = rgb(200, 200, 200)        # Matches your clock text color
    
   fade_on_empty = false
   placeholder_text = <span foreground="##c8c8c8"><i>Password...</i></span> 
   hide_input = false
   rounding = 20             # Smooth rounded corners (looks better than a pill/oval)

   # Transition colors
   check_color = rgb(224, 187, 228)
   fail_color = rgb(204, 34, 34)
   fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    
   # Positioning
   position = 0, -60        # Moved down slightly to give the clock more breathing room
   halign = center
   valign = center

   # Matching Shadows
   shadow_passes = 2
   shadow_size = 3
   shadow_color = rgb(0, 0, 0)
   shadow_boost = 1.2
}

background {
   monitor = 
   path = /home/Erik/.wallpapers/mtfuji.png   # only png supported for now
   color = rgba(25, 20, 20, 1.0)
   dim = 0
   # all these options are taken from hyprland, see https://wiki.hyprland.org/Configuring/Variables/#blur for explanations
   blur_passes = 3 # 0 disables blurring
   blur_size = 10
   noise = 0.0117
   contrast = 0.8
   brightness = 0.8
   vibrancy = 0.2
   vibrancy_darkness = 0.0
}

background {
   monitor = HDMI-A-1
   path = /home/erik/.wallpapers/neonwallpaper.png 
   #path = /home/me/someImage.png   # only png supported for now
   #color = rgba(25, 20, 20, 1.0)

   # all these options are taken from hyprland, see https://wiki.hyprland.org/Configuring/Variables/#blur for explanations
   blur_passes = 0 # 0 disables blurring
   blur_size = 7
   noise = 0.0117
   contrast = 0.8916
   brightness = 0.8172
   vibrancy = 0.1696
   vibrancy_darkness = 0.0
}

label {
   monitor = DP-3
   text = cmd[update:1000] echo "$(date +"%-I:%M %p")"
   color = rgba(200, 200, 200, 1.0)
   font_size = 64
   font_family = JetBrainsMonoNL NFM
   position = 0, 50
   halign = center
   valign = center

   # Shadow adds depth
   shadow_passes = 2
   shadow_size = 3
   shadow_color = rgb(0, 0, 0)
   shadow_boost = 1.2
}

